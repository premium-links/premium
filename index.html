<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Ejecutivo & Enlaces Premium</title>
    <style>
        /* Estilos de Lujo: Minimalismo, Neomorfismo y Tonos Oscuros */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 30px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37; /* Detalle en oro premium */
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-decoration: none;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Efecto de iluminación al pasar el cursor */
        .btn-link:hover {
            background: #ffffff;
            color: #0a0a0a;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-highlight {
            border: 1px solid #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        .btn-highlight:hover {
            background: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Reemplazar con la URL de la foto del cliente -->
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400" alt="Foto de Perfil" class="profile-img">
        
        <h1 id="userName">Nombre del Creador</h1>
        <div class="subtitle" id="userTitle">Artista Digital & Diseñador</div>

        <div class="links-container">
            <!-- Enlace Destacado (Por ejemplo, para vender un e-book o curso) -->
            <a href="#" class="btn-link btn-highlight" target="_blank">🌟 Adquiere mi Nuevo E-Book Aquí</a>
            
            <!-- Enlaces Estándar -->
            <a href="#" class="btn-link" target="_blank">📸 Portafolio en Instagram</a>
            <a href="#" class="btn-link" target="_blank">🎨 Galería de Arte NFT</a>
            <a href="#" class="btn-link" target="_blank">📺 Canal de YouTube</a>
            <a href="#" class="btn-link" target="_blank">✉️ Contacto Directo</a>
        </div>

        <footer>
            DISEÑO EXCLUSIVO © 2026
        </footer>
    </div>

    <script>
        // Script dinámico simple por si deseas conectar esta plantilla a un panel de control en el futuro
        console.log("Estructura de interfaz premium cargada correctamente.");
    </script>
</body>
</html>
